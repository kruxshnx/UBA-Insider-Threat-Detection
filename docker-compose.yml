# ──────────────────────────────────────────────────────────────────────────────
# Docker Compose — Full UBA Stack (backend API + frontend dashboard)
#   docker compose up --build
# The frontend (nginx) reverse-proxies /api to the backend, so the browser only
# ever talks to the frontend origin — no CORS juggling, no internal hostnames.
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uba-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data       # generated data + risk reports (source of truth)
      - ./models:/app/models   # trained models
    environment:
      - UBA_LOG_LEVEL=INFO
      - UBA_CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      # Override the dev-only default PII salt in real deployments:
      # - UBA_PII_SALT=change-me-in-production
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Frontend (React build served by nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: uba-frontend
    ports:
      - "5173:80"              # nginx listens on 80 inside the container
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
