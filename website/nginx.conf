# nginx config for the UBA frontend container.
# - Serves the built SPA with history-API fallback (client-side routing).
# - Reverse-proxies /api/* to the backend service so the browser can use a
#   relative API base and avoid CORS / internal-hostname issues.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Proxy API calls to the backend container (compose service name: backend)
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — every non-file route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (they are content-hashed by Vite)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
